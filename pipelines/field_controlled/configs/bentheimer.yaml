# Bentheimer — field-controlled latent diffusion configuration.
#
# Hyperparameters below reflect the paper (main.tex, Algorithms 1 & 2)
# and the shipping runs:
#   FC-257: savedmodels/experimental/20260324-dfn-bentheimer-gpdata4-257-porosity-field
#   FC-129: savedmodels/experimental/20260328-dfn-bentheimer-gpdata4-129-porosity-field
# Both checkpoints are published at
#   savedmodels/pore/field_controlled/fc{257,129}/bentheimer.ckpt
# (symlinks into the experimental folders — the experimental runs are the
# authoritative source on disk).
#
# NOTE: the shipping runs' logs/version_0/hparams.yaml is empty, so the
# values below come from main.tex and scripts/legacy/0003c-…-vol-correction.py
# argparse defaults. Verify against the actual training command if you
# need bit-perfect reproducibility.

rock: Bentheimer

data:
  volume_filename: Bentheimer_1000c_3p0035um.raw
  volume_shape: [1000, 1000, 1000]
  voxel_size_um: 3.0035  # physical voxel size, micrometres

field:
  # Two coarse-graining variants evaluated in the paper.
  # Select one with `--variant fc257` or `--variant fc129` at the CLI.
  fc257:
    radius: 128            # kernel size = 2*radius + 1 = 257
  fc129:
    radius: 64             # kernel size = 2*radius + 1 = 129

base_training:
  # Stage 2: scalar-conditioned base LDM (Algorithm 1).
  subvolume_size: 256
  epochs: 50
  samples_per_epoch: 34560
  batch_size: 1
  accumulate_grad_batches: 8
  lr: 1.0e-4
  warmup_steps: 1000
  weight_decay: 0.01
  grad_clip: 1.0
  cond_dropout: 0.1        # classifier-free guidance hook (also enables Uncond baseline)
  sigma_min: 0.002
  sigma_max: 80.0
  sigma_data: 0.5
  train_split_along_last_axis: 700

field_training:
  # Stage 3: field-conditioned fine-tune (Algorithm 2).
  subvolume_size: 256
  epochs: 20
  samples_per_epoch: 34560
  batch_size: 1
  accumulate_grad_batches: 8
  lr: 2.0e-5
  warmup_epochs: 2
  weight_decay: 0.01
  grad_clip: 1.0
  ema_decay: 0.99
  downsample_factor: 8     # VAE compression F — must match the VAE checkpoint
  train_split_along_last_axis: 600  # after inward crop of r voxels on each face

generation:
  # Stage 4 inference defaults. Override at CLI for other shapes.
  target_size: 1024        # usable voxels per side after cropping
  border_crop: 128
  ode_steps: 21
  coarse_grid_size: 32     # GP sampling grid; upsampled via trilinear interp
